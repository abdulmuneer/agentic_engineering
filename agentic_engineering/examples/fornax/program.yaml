  tailoring:
    status: confirmed
    questions:
      - Which physical environments and frozen fixtures establish reproducibility?
      - Which claims are authorized by G2 evidence and which remain forbidden?
      - Which external lab writes require explicit human authorization?
    answers:
      - question: Which physical environments and frozen fixtures establish reproducibility?
        answer: The named physical-two-node-lab environment and frozen G2 reference fixture.
      - question: Which claims are authorized by G2 evidence and which remain forbidden?
        answer: Only the three named-fixture claims are authorized; frontier, resilience, unattended, performance, and readiness claims remain forbidden.
      - question: Which external lab writes require explicit human authorization?
        answer: Every physical-lab execution that writes fixture traces requires a subject- and actor-bound decision plus an action receipt.
    confirmed_by: human:project-owner
    confirmed_at: "2026-07-10T09:45:00Z"
